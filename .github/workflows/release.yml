name: Release
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
jobs:
  vsix:
    name: Build VSIX
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: extensions/vscode/package-lock.json
      - name: Install dependencies
        run: cd extensions/vscode && npm install
      - name: Build VSIX
        run: |
          cd extensions/vscode
          npx vsce package --out ../verse-language.vsix --allow-missing-repository
      - name: Upload VSIX
        uses: softprops/action-gh-release@v2
        with:
          files: verse-language.vsix
          generate_release_notes: true

  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-latest
            archive: tar.gz
            needs_cross: true
          - target: aarch64-unknown-linux-musl
            runner: ubuntu-latest
            archive: tar.gz
            needs_cross: true
          - target: x86_64-apple-darwin
            runner: macos-latest
            archive: tar.gz
            needs_cross: false
          - target: aarch64-apple-darwin
            runner: macos-latest
            archive: tar.gz
            needs_cross: false
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            archive: zip
            needs_cross: false
    steps:
      - uses: actions/checkout@v4
      - name: Install cross
        if: matrix.needs_cross == true
        run: cargo install cross
      - name: Build
        run: |
          if [ "${{ matrix.needs_cross }}" == "true" ]; then
            cross build --release --workspace --target ${{ matrix.target }}
          else
            cargo build --release --workspace --target ${{ matrix.target }}
          fi
      - name: Package
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          if [ "${{ matrix.archive }}" == "tar.gz" ]; then
            mkdir -p release-staging
            for f in verse-lsp; do
              if [ -f "$f" ]; then
                cp "$f" release-staging/
              fi
            done
            tar czf release.tar.gz -C release-staging .
            mv release.tar.gz ../release.tar.gz
          else
            mkdir -p release-staging
            for f in verse-lsp.exe; do
              if [ -f "$f" ]; then
                cp "$f" release-staging/
              fi
            done
            cd release-staging
            powershell -Command "Compress-Archive -Path * -DestinationPath ../release.zip"
          fi
      - name: SHA256
        run: |
          if [ "${{ matrix.archive }}" == "tar.gz" ]; then
            sha256sum target/${{ matrix.target }}/release.tar.gz > target/${{ matrix.target }}/release.sha256
          else
            sha256sum target/${{ matrix.target }}/release.zip > target/${{ matrix.target }}/release.sha256
          fi
      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: target/${{ matrix.target }}/release.${{ matrix.archive }}
          token: ${{ secrets.GITHUB_TOKEN }}

  release:
    needs: [vsix, build]
    runs-on: ubuntu-latest
    steps:
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}