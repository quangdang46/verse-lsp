name: Release
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
jobs:
  vsix:
    name: Build VSIX
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: extensions/vscode/package-lock.json
      - name: Install dependencies
        run: cd extensions/vscode && npm install
      - name: Build VSIX
        run: |
          cd extensions/vscode
          npx vsce package --allow-missing-repository

      - name: Upload VSIX
        uses: softprops/action-gh-release@v2
        with:
          files: extensions/vscode/verse-language.vsix
          generate_release_notes: true

  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-latest
            archive: tar.gz
            needs_cross: true
          - target: aarch64-unknown-linux-musl
            runner: ubuntu-latest
            archive: tar.gz
            needs_cross: true
          - target: x86_64-apple-darwin
            runner: macos-latest
            archive: tar.gz
            needs_cross: false
          - target: aarch64-apple-darwin
            runner: macos-latest
            archive: tar.gz
            needs_cross: false
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            archive: zip
            needs_cross: false
    steps:
      - uses: actions/checkout@v4
      - name: Install cross
        if: matrix.needs_cross == true
        run: cargo install cross
      - name: Build (cross)
        run: cross build --release --workspace --target ${{ matrix.target }}
        if: matrix.needs_cross == true

      - name: Build (native)
        run: cargo build --release --workspace
        if: matrix.needs_cross != 'true'

      - name: Package (tar.gz)
        shell: bash
        run: |
          mkdir -p release-staging
          cp target/${{ matrix.target }}/release/verse-lsp release-staging/
          tar czf release.tar.gz -C release-staging .
        if: matrix.archive == 'tar.gz' && matrix.needs_cross == 'true'

      - name: Package (native tar.gz)
        shell: bash
        run: |
          mkdir -p release-staging
          cp target/release/verse-lsp release-staging/
          tar czf release-${{ matrix.target }}.tar.gz -C release-staging .
        if: matrix.archive == 'tar.gz' && matrix.needs_cross != 'true'

      - name: Package (zip)
        run: |
          mkdir release-staging
          cp target/release/verse-lsp.exe release-staging/
          Compress-Archive -Path release-staging/* -DestinationPath release-${{ matrix.target }}.zip
        if: matrix.archive == 'zip'

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.needs_cross == 'true' && format('target/{0}/release/release.{1}', matrix.target, matrix.archive) || format('release-{0}.{1}', matrix.target, matrix.archive) }}
          token: ${{ secrets.GITHUB_TOKEN }}
        if: matrix.archive == 'tar.gz'

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.needs_cross == 'true' && format('target/{0}/release/release.{1}', matrix.target, matrix.archive) || format('release-{0}.{1}', matrix.target, matrix.archive) }}
          token: ${{ secrets.GITHUB_TOKEN }}
        if: matrix.archive == 'zip'

  release:
    needs: [vsix, build]
    runs-on: ubuntu-latest
    steps:
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}